<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bds-launcher</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <p>MC WEREWOLF</p>
      <h1 id="update-status">BDSをセットアップ</h1>
      <pre id="update-details" aria-live="polite"></pre>

      <label class="agreement">
        <input id="eula-agreement" type="checkbox" />
        <span><a href="https://www.minecraft.net/eula" target="_blank">Minecraft EULA</a> と <a href="https://www.microsoft.com/privacy/privacystatement" target="_blank">プライバシーポリシー</a>に同意します</span>
      </label>
      <button id="prepare-btn" disabled>ダウンロードして準備</button>

      <div class="row" id="actions" hidden>
        <button id="start-server-btn">サーバー起動</button>
      </div>
      <p id="start-server-msg"></p>
      <button id="publish-server-btn" hidden>インターネットへ公開</button>
      <p id="publish-server-msg"></p>
    </main>
  </body>
</html>
